services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scannerpass}
      POSTGRES_DB: ${POSTGRES_DB:-opencode_scanner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanner} -d ${POSTGRES_DB:-opencode_scanner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - .:/app
      - results_data:/app/results
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-scanner}:${POSTGRES_PASSWORD:-scannerpass}@db:5432/${POSTGRES_DB:-opencode_scanner}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-very-secret-key-2026}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-fernet-key-2026}
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: celery -A backend.app.worker.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - .:/app
      - results_data:/app/results
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-scanner}:${POSTGRES_PASSWORD:-scannerpass}@db:5432/${POSTGRES_DB:-opencode_scanner}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-very-secret-key-2026}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-fernet-key-2026}
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Required for masscan raw sockets
    cap_add:
      - NET_RAW
      - NET_ADMIN
    privileged: true

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-12211}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - results_data:/app/results:ro
    depends_on:
      - web

volumes:
  pgdata:
  results_data:
