services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scannerpass
      POSTGRES_DB: opencode_scanner
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d opencode_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - results_data:/app/results
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://scanner:scannerpass@db:5432/opencode_scanner
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production-very-secret-key-2026
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A backend.app.worker.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - .:/app
      - results_data:/app/results
    environment:
      - DATABASE_URL=postgresql+psycopg2://scanner:scannerpass@db:5432/opencode_scanner
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production-very-secret-key-2026
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Required for masscan raw sockets
    cap_add:
      - NET_RAW
      - NET_ADMIN
    privileged: true

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - results_data:/app/results:ro
    depends_on:
      - web

volumes:
  pgdata:
  results_data:
